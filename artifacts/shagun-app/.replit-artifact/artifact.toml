kind = "mobile"
previewPath = "/"
title = "Digital Shagun - Social Gifting Platform"
version = "1.0.0"
id = "artifacts/shagun-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21007
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/shagun-app run dev"

[services.env]
PORT = "21007"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/shagun-app", "run", "build"]
run = ["pnpm", "--filter", "@workspace/shagun-app", "run", "serve"]
