name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint and Typecheck API Server
        run: |
          cd artifacts/api-server
          pnpm lint
          pnpm typecheck

      - name: Lint and Typecheck Shagun App
        run: |
          cd artifacts/shagun-app
          pnpm lint
          pnpm typecheck
